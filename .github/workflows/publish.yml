# Manually-triggered npm publish with provenance.
#
# Publishes whatever version is currently in package.json on `main`.
# Recommended flow:
#   1. Bump the version in package.json and update the README changelog.
#   2. Commit + push to main.
#   3. Actions → Publish → Run workflow.
#
# ─── ONE-TIME npm AUTH SETUP ───────────────────────────────────────────────────
#
# For the FIRST publish of a brand-new package, npm Trusted Publishing (OIDC)
# is not available (npm requires the package to exist before you can configure
# a trusted publisher). So we authenticate with a Granular Access Token:
#
#   1. https://www.npmjs.com/settings/<your-user>/tokens → Generate New Token
#      → Granular Access Token.
#      - Expiration: 90 days (max allowed for write tokens).
#      - Packages: "All packages" for the first publish (you can scope it down
#        to n8n-nodes-arco-crm after the package exists).
#      - Permissions: Read and write.
#      - "Bypass two-factor authentication when publishing": ENABLED.
#   2. Copy the token (npm_...) — it is only shown once.
#   3. GitHub → repo Settings → Secrets and variables → Actions → New secret
#      named NPM_TOKEN, paste the token.
#
# After the first successful publish, you can switch to OIDC Trusted Publishing
# (no secrets at all): on npmjs.com → package settings → Trusted Publishers →
# Add a publisher → GitHub Actions, then fill in owner/repo + workflow file
# `publish.yml`. Once configured, you can delete the NPM_TOKEN secret; the
# workflow keeps working because `id-token: write` below enables the OIDC
# exchange automatically.

name: Publish

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      # Required to mint an OIDC token for npm provenance attestation
      # (and for future Trusted Publishing authentication).
      id-token: write
      # Scoped to least-privilege; we don't need to push anything.
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # npm >= 11.5.1 is required for trusted publishing OIDC exchange.
          # lts/* on a current Ubuntu runner already ships npm 11+.
          node-version: 'lts/*'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Publish to npm
        # Publishes directly with --provenance and --access=public. We do not
        # use `n8n-node release` here because in CI it shells out to release-it
        # for git commit/tag/push/GitHub-release — none of which we want from
        # a workflow_dispatch run that publishes an already-pushed commit.
        #
        # If NPM_TOKEN is set in repo secrets, it is used. Otherwise the npm
        # CLI falls back to Trusted Publishing OIDC (which requires the
        # package to already exist on npm and a publisher configured in the
        # npmjs.com UI).
        run: npm publish --provenance --access public
        env:
          # actions/setup-node writes an .npmrc that reads NODE_AUTH_TOKEN.
          # If the secret is unset (Trusted Publishing path), npm falls back
          # to OIDC, which is fine — but Trusted Publishing requires the
          # package to already exist on npm. For the first publish, set the
          # NPM_TOKEN secret (granular token with "bypass 2FA" enabled).
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # @n8n/node-cli's `prepublishOnly` hook (n8n-node prerelease) aborts
          # the publish unless this env flag is set — the hook exists to stop
          # accidental local `npm publish` outside the release flow.
          RELEASE_MODE: 'true'
          # npm respects this even if package.json's publishConfig is ignored.
          NPM_CONFIG_PROVENANCE: 'true'
